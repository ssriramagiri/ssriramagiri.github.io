<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAI</title>
  <style>
    @font-face {
      font-family: 'Berkeley Mono';
      src: local('Berkeley Mono'), local('BerkeleyMono-Regular');
      font-weight: 400;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      color-scheme: light dark;
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #bouncer {
      position: absolute;
      left: 0;
      top: 0;
      display: inline-block;
      white-space: pre;
      font-size: 1.4rem;
      line-height: 1;
      letter-spacing: 0.02em;
      margin: 0;
      padding: 0;
      transition: color 0.4s ease;
      pointer-events: none;
      user-select: none;
    }

    .nav-overlay {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      z-index: 10;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-overlay a {
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.6rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-overlay a::before {
      content: '→';
      color: #fff;
      transition: color 0.3s ease;
    }

    .nav-overlay a::after {
      content: '';
      display: inline-block;
      overflow: hidden;
      width: 0;
      opacity: 0;
      transition: width 0.2s ease, opacity 0.2s ease;
      animation: glyphs 0.4s steps(1) infinite;
      white-space: pre;
    }

    .nav-overlay a:hover { color: #fff; }
    .nav-overlay a:hover::before { content: '▶'; animation: arrow-blink 0.6s steps(1) infinite; }
    .nav-overlay a:hover::after { width: 4ch; opacity: 1; }

    @keyframes glyphs {
      0%  { content: ' ░▒▓'; }
      14% { content: ' ▓░▒'; }
      28% { content: ' ▒▓░'; }
      42% { content: ' ◈◇◆'; }
      57% { content: ' ■□■'; }
      71% { content: ' ◆◇◈'; }
      85% { content: ' ▓▒░'; }
    }

    @keyframes arrow-blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .site-id {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.6rem;
      color: #fff;
      letter-spacing: 0.04em;
      z-index: 10;
      text-align: right;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: light) {
      html, body { background: #f5f5f5; }
      .nav-overlay a { color: #ccc; }
      .nav-overlay a::before { color: #ddd; }
      .nav-overlay a:hover { color: #999; }
      .nav-overlay a:hover::before { color: #aaa; }
      .site-id { color: #ddd; }
    }

    @media (max-width: 600px) {
      #bouncer { font-size: 0.75rem; }
      .nav-overlay { bottom: 1.2rem; left: 1.2rem; }
      .site-id { bottom: 1.2rem; right: 1.2rem; }
    }

    @media (min-width: 601px) and (max-width: 1024px) {
      #bouncer { font-size: 1rem; }
    }
  </style>
</head>
<body>

<pre id="bouncer">┌─────────────────┐
│ ▄▀▀▀  ▄▀▀▄  ▀█▀ │
│ ▀▀▀▄  █▄▄█   █  │
│ ▀▀▀   ▀  ▀  ▀▀▀ │
│ ◆◇◆         001 │
└─────────────────┘</pre>

<nav>
  <ul class="nav-overlay">
    <li><a href="/mechanical-slavery-of-knowledge-work/">The Mechanical Slavery of Knowledge Work</a></li>
  </ul>
</nav>

<div class="site-id">
  <div id="stockholm-clock"></div>
  <div>ssriramagiri.com</div>
</div>
<script>
(function () {
  var clockEl = document.getElementById('stockholm-clock');
  function updateClock() {
    var now = new Date();
    var opts = { timeZone: 'Europe/Stockholm', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    var dateOpts = { timeZone: 'Europe/Stockholm', year: 'numeric', month: '2-digit', day: '2-digit' };
    var time = now.toLocaleTimeString('en-GB', opts);
    var date = now.toLocaleDateString('en-GB', dateOpts);
    var offset = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Stockholm' }));
    var utcOff = Math.round((offset - new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }))) / 3600000);
    clockEl.textContent = 'Stockholm ' + date + ' ' + time + ' GMT' + (utcOff >= 0 ? '+' : '') + utcOff;
  }
  updateClock();
  setInterval(updateClock, 1000);
})();

(function () {
  var el = document.getElementById('bouncer');
  var colors = ['#1a73e8','#1e8e3e','#c5221f','#f9ab00','#babcbe'];
  var ci = 0, x = 0, y = 0, dx = 1.5, dy = 1.5;

  function frame() {
    var w = el.offsetWidth, h = el.offsetHeight;
    var mx = innerWidth - w, my = innerHeight - h;

    if (x <= 0 || x >= mx) { dx = -dx; el.style.color = colors[ci++ % colors.length]; }
    if (y <= 0 || y >= my) { dy = -dy; el.style.color = colors[ci++ % colors.length]; }

    x = Math.max(0, Math.min(mx, x + dx));
    y = Math.max(0, Math.min(my, y + dy));

    el.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    requestAnimationFrame(frame);
  }

  x = Math.random() * (innerWidth - el.offsetWidth);
  y = Math.random() * (innerHeight - el.offsetHeight);
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
