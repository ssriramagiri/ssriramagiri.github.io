<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAI</title>
  <style>
    @font-face {
      font-family: 'Berkeley Mono';
      src: local('Berkeley Mono'), local('BerkeleyMono-Regular');
      font-weight: 400;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .flipdot-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: transparent;
      padding: 12px;
    }

    .flipdot-grid {
      display: grid;
      gap: 3px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1a1a1a;
      transition: background 0.06s ease-out, box-shadow 0.06s ease-out;
      will-change: background, box-shadow;
    }

    .dot.on {
      background: #e8e8e8;
      box-shadow: 0 0 3px rgba(232,232,232,0.4);
    }

    .nav-overlay {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      z-index: 10;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .nav-overlay a {
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.6rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-overlay a::before {
      content: '→';
      color: #fff;
      transition: color 0.3s ease;
    }

    .nav-overlay a::after {
      content: '';
      display: inline-block;
      overflow: hidden;
      width: 0;
      opacity: 0;
      transition: width 0.2s ease, opacity 0.2s ease;
      animation: glyphs 0.4s steps(1) infinite;
      white-space: pre;
    }

    .nav-overlay a:hover { color: #fff; }
    .nav-overlay a:hover::before { content: '▶'; animation: arrow-blink 0.6s steps(1) infinite; }
    .nav-overlay a:hover::after { width: 4ch; opacity: 1; }

    @keyframes glyphs {
      0%  { content: ' ░▒▓'; }
      14% { content: ' ▓░▒'; }
      28% { content: ' ▒▓░'; }
      42% { content: ' ◈◇◆'; }
      57% { content: ' ■□■'; }
      71% { content: ' ◆◇◈'; }
      85% { content: ' ▓▒░'; }
    }

    @keyframes arrow-blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .site-id {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.6rem;
      color: #fff;
      letter-spacing: 0.04em;
      z-index: 10;
      text-align: right;
      line-height: 1.6;
    }

    #game-trigger {
      cursor: pointer;
      user-select: none;
      position: relative;
      display: inline-block;
    }
    #game-trigger:hover { color: #aaa; }

    .game-selector {
      position: absolute;
      bottom: 100%;
      right: 0;
      margin-bottom: 0.4rem;
      background: #111;
      border: 1px solid #333;
      padding: 0.3rem 0;
      min-width: 10rem;
      display: none;
      z-index: 100;
    }
    .game-selector.open { display: block; }

    .game-selector .game-option {
      padding: 0.25rem 0.6rem;
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.6rem;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }
    .game-selector .game-option.active {
      color: #fff;
      background: #222;
    }
    .game-selector .game-option.active::before {
      content: '▶ ';
    }

    .game-hud {
      position: fixed;
      top: 1rem;
      right: 2rem;
      font-family: 'Berkeley Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 0.6rem;
      color: #555;
      z-index: 10;
      letter-spacing: 0.04em;
      display: none;
    }
    .game-hud.visible { display: block; }

    @media (max-width: 600px) {
      .flipdot-container { padding: 8px; }
      .flipdot-grid { gap: 2px; }
      .dot { width: 5px; height: 5px; }
      .nav-overlay { bottom: 1.2rem; left: 1.2rem; }
      .site-id { top: 1.2rem; left: 1.2rem; bottom: auto; right: auto; text-align: left; }
      .game-selector { right: auto; left: 0; }
      .game-hud { right: auto; left: 1.2rem; }
    }
  </style>
</head>
<body>

<div class="flipdot-container">
  <div class="flipdot-grid" id="grid"></div>
</div>

<nav>
  <ul class="nav-overlay">
    <li><a href="/mechanical-slavery-of-knowledge-work/">The Mechanical Slavery of Knowledge Work</a></li>
  </ul>
</nav>

<div class="game-hud" id="game-hud">
  <span id="game-score">score: 0</span> · <span id="game-hint">esc to quit</span>
</div>

<div class="site-id">
  <div id="game-trigger">???
    <div class="game-selector" id="game-selector">
      <div class="game-option" data-game="snake">snake</div>
    </div>
  </div>
  <div id="stockholm-clock"></div>
  <div>ssriramagiri.com</div>
</div>

<script>
(function () {
  var clockEl = document.getElementById('stockholm-clock');
  function updateClock() {
    var now = new Date();
    var opts = { timeZone: 'Europe/Stockholm', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    var dateOpts = { timeZone: 'Europe/Stockholm', year: 'numeric', month: '2-digit', day: '2-digit' };
    var time = now.toLocaleTimeString('en-GB', opts);
    var date = now.toLocaleDateString('en-GB', dateOpts);
    var offset = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Stockholm' }));
    var utcOff = Math.round((offset - new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }))) / 3600000);
    clockEl.textContent = 'Stockholm ' + date + ' ' + time + ' GMT' + (utcOff >= 0 ? '+' : '') + utcOff;
  }
  updateClock();
  setInterval(updateClock, 1000);
})();

(function () {
  var COLS = 40;
  var ROWS = 40;
  var grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = 'repeat(' + COLS + ', 1fr)';

  // Adjust for mobile
  if (window.innerWidth <= 600) {
    COLS = 32;
    ROWS = 32;
    grid.style.gridTemplateColumns = 'repeat(' + COLS + ', 1fr)';
  }

  var dots = [];
  for (var i = 0; i < ROWS * COLS; i++) {
    var d = document.createElement('div');
    d.className = 'dot';
    grid.appendChild(d);
    dots.push(d);
  }

  var state = new Uint8Array(ROWS * COLS);
  var prev = new Uint8Array(ROWS * COLS);

  function set(r, c, v) {
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) state[r * COLS + c] = v ? 1 : 0;
  }
  function get(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return 0;
    return state[r * COLS + c];
  }

  function clear() { state.fill(0); }

  function render() {
    for (var i = 0; i < state.length; i++) {
      if (state[i] !== prev[i]) {
        if (state[i]) dots[i].classList.add('on');
        else dots[i].classList.remove('on');
      }
    }
    prev.set(state);
  }

  // 5x7 pixel font for text
  var FONT = {
    S: [0x1e,0x21,0x20,0x1e,0x01,0x21,0x1e],
    A: [0x0e,0x11,0x11,0x1f,0x11,0x11,0x11],
    I: [0x1f,0x04,0x04,0x04,0x04,0x04,0x1f],
    ' ': [0,0,0,0,0,0,0],
    0: [0x0e,0x11,0x13,0x15,0x19,0x11,0x0e],
    1: [0x04,0x0c,0x04,0x04,0x04,0x04,0x0e],
    2: [0x0e,0x11,0x01,0x06,0x08,0x10,0x1f],
    3: [0x0e,0x11,0x01,0x06,0x01,0x11,0x0e],
    4: [0x02,0x06,0x0a,0x12,0x1f,0x02,0x02],
    5: [0x1f,0x10,0x1e,0x01,0x01,0x11,0x0e],
    6: [0x06,0x08,0x10,0x1e,0x11,0x11,0x0e],
    7: [0x1f,0x01,0x02,0x04,0x04,0x04,0x04],
    8: [0x0e,0x11,0x11,0x0e,0x11,0x11,0x0e],
    9: [0x0e,0x11,0x11,0x0f,0x01,0x02,0x0c],
    ':': [0x00,0x04,0x04,0x00,0x04,0x04,0x00],
  };

  function drawChar(ch, startR, startC) {
    var glyph = FONT[ch];
    if (!glyph) return;
    for (var r = 0; r < 7; r++) {
      for (var c = 0; c < 5; c++) {
        if (glyph[r] & (1 << (4 - c))) set(startR + r, startC + c, 1);
      }
    }
  }

  function drawText(text, startR, startC) {
    for (var i = 0; i < text.length; i++) {
      drawChar(text[i], startR, startC + i * 6);
    }
  }

  // --- Animation patterns ---

  // 1. Apple-style cursive "hello" drawn progressively
  var helloPath = []; // float coords for distance-field rendering
  var helloCells = []; // precomputed {idx, pathPos} for fast animation
  var helloPhase = 0;
  (function buildHelloPath() {
    function cubicBez(p0, p1, p2, p3, n) {
      var pts = [];
      for (var i = 0; i <= n; i++) {
        var t = i / n, u = 1 - t;
        pts.push({
          x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
          y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y
        });
      }
      return pts;
    }

    // Design space: x ~1-28, y ~-1 to 17. baseline=14, x-height=7.5, ascender=1
    var segs = [
      // h: stem up
      [{x:2,y:14}, {x:2,y:10}, {x:2,y:5}, {x:2,y:1}],
      // h: top loop
      [{x:2,y:1}, {x:2,y:-1}, {x:4.5,y:-1}, {x:4,y:2.5}],
      // h: stem back down
      [{x:4,y:2.5}, {x:3.5,y:6}, {x:3,y:10}, {x:3,y:14}],
      // h: curve into arch
      [{x:3,y:14}, {x:3,y:16.5}, {x:6,y:9}, {x:7.5,y:7.5}],
      // h: arch peak and down
      [{x:7.5,y:7.5}, {x:8.5,y:7}, {x:9.5,y:7.5}, {x:10,y:10}],
      // h: to baseline
      [{x:10,y:10}, {x:10.3,y:12}, {x:10.3,y:13.5}, {x:10.5,y:14.5}],

      // e: up from baseline
      [{x:10.5,y:14.5}, {x:11,y:13}, {x:11.5,y:11}, {x:12,y:10}],
      // e: crossbar right
      [{x:12,y:10}, {x:13,y:9.5}, {x:14,y:9.5}, {x:15,y:10.5}],
      // e: loop over top
      [{x:15,y:10.5}, {x:15.5,y:8.5}, {x:14.5,y:7}, {x:13,y:7}],
      // e: loop left and down
      [{x:13,y:7}, {x:11.5,y:7}, {x:11,y:9}, {x:11.5,y:11}],
      // e: exit to baseline
      [{x:11.5,y:11}, {x:12,y:13.5}, {x:14,y:15.5}, {x:15.5,y:14.5}],

      // l1: ascender up
      [{x:15.5,y:14.5}, {x:16,y:11}, {x:16.5,y:6}, {x:17,y:1}],
      // l1: top loop
      [{x:17,y:1}, {x:17.2,y:-1}, {x:19.5,y:-1}, {x:19,y:2.5}],
      // l1: back down
      [{x:19,y:2.5}, {x:18.5,y:6}, {x:18,y:11}, {x:18.5,y:14.5}],

      // l2: ascender up
      [{x:18.5,y:14.5}, {x:19,y:11}, {x:19.5,y:6}, {x:20,y:1}],
      // l2: top loop
      [{x:20,y:1}, {x:20.2,y:-1}, {x:22.5,y:-1}, {x:22,y:2.5}],
      // l2: back down
      [{x:22,y:2.5}, {x:21.5,y:6}, {x:21,y:11}, {x:21.5,y:14.5}],

      // o: up and into oval
      [{x:21.5,y:14.5}, {x:22,y:13}, {x:23,y:10}, {x:24.5,y:8}],
      // o: top right
      [{x:24.5,y:8}, {x:26,y:7}, {x:27.5,y:8}, {x:27.5,y:10.5}],
      // o: right down
      [{x:27.5,y:10.5}, {x:27.5,y:13}, {x:26,y:15}, {x:24,y:15.5}],
      // o: bottom back
      [{x:24,y:15.5}, {x:22.5,y:15.5}, {x:22,y:14}, {x:22.5,y:11}],
    ];

    // Sample all segments into float-coord path
    for (var s = 0; s < segs.length; s++) {
      var pts = cubicBez(segs[s][0], segs[s][1], segs[s][2], segs[s][3], 40);
      for (var i = (s === 0 ? 0 : 1); i < pts.length; i++) {
        helloPath.push(pts[i]);
      }
    }

    // Scale path to fit grid with margin
    var margin = 2;
    var scaleX = (COLS - margin * 2) / 29;
    var scaleY = (ROWS - margin * 2) / 19;
    var scale = Math.min(scaleX, scaleY);
    var designW = 29 * scale;
    var designH = 19 * scale;
    var offC = (COLS - designW) / 2 - 1 * scale;
    var offR = (ROWS - designH) / 2 + 1 * scale;

    for (var p = 0; p < helloPath.length; p++) {
      helloPath[p] = {
        x: helloPath[p].x * scale + offC,
        y: helloPath[p].y * scale + offR
      };
    }

    // Precompute distance field: for each grid cell, find earliest path index within stroke radius
    var STROKE = 0.55;
    var STROKE_SQ = STROKE * STROKE;
    var activation = new Float32Array(ROWS * COLS);
    for (var i = 0; i < activation.length; i++) activation[i] = 1e9;

    for (var pi = 0; pi < helloPath.length; pi++) {
      var px = helloPath[pi].x, py = helloPath[pi].y;
      var minR = Math.max(0, Math.floor(py - STROKE - 1));
      var maxR = Math.min(ROWS - 1, Math.ceil(py + STROKE + 1));
      var minC = Math.max(0, Math.floor(px - STROKE - 1));
      var maxC = Math.min(COLS - 1, Math.ceil(px + STROKE + 1));
      for (var r = minR; r <= maxR; r++) {
        for (var c = minC; c <= maxC; c++) {
          var dr = r - py, dc = c - px;
          if (dr * dr + dc * dc < STROKE_SQ) {
            var idx = r * COLS + c;
            if (pi < activation[idx]) activation[idx] = pi;
          }
        }
      }
    }

    // Build sorted list of cells by activation time
    for (var i = 0; i < activation.length; i++) {
      if (activation[i] < 1e9) {
        helloCells.push({ idx: i, at: activation[i] });
      }
    }
    helloCells.sort(function(a, b) { return a.at - b.at; });
  })();

  var helloCellPtr = 0;
  function animHello() {
    var drawUpTo = helloPhase * 4;
    while (helloCellPtr < helloCells.length && helloCells[helloCellPtr].at <= drawUpTo) {
      state[helloCells[helloCellPtr].idx] = 1;
      helloCellPtr++;
    }
    helloPhase++;
    return helloPhase > helloPath.length / 4 + 80;
  }

  // 2. Concentric rings expanding
  var ringPhase = 0;
  function animRings() {
    clear();
    var cx = COLS / 2, cy = ROWS / 2;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var dist = Math.sqrt((c - cx) * (c - cx) + (r - cy) * (r - cy));
        var ring = Math.floor(dist) % 6;
        var phase = (ring + ringPhase) % 6;
        if (phase < 2) set(r, c, 1);
      }
    }
    ringPhase++;
    return ringPhase > 200;
  }

  // 3. Matrix rain
  var drops = [];
  var rainPhase = 0;
  function animRain() {
    if (rainPhase === 0) {
      drops = [];
      for (var c = 0; c < COLS; c++) {
        drops.push({ c: c, r: -Math.floor(Math.random() * ROWS), speed: 0.3 + Math.random() * 0.7, len: 3 + Math.floor(Math.random() * 8) });
      }
    }
    clear();
    for (var i = 0; i < drops.length; i++) {
      var d = drops[i];
      for (var j = 0; j < d.len; j++) {
        var row = Math.floor(d.r) - j;
        if (row >= 0 && row < ROWS) set(row, d.c, 1);
      }
      d.r += d.speed;
      if (d.r - d.len > ROWS) {
        d.r = -Math.floor(Math.random() * 10);
        d.len = 3 + Math.floor(Math.random() * 8);
      }
    }
    rainPhase++;
    return rainPhase > 200;
  }

  // 4. Game of Life
  var lifeState, lifeTick;
  function animLifeInit() {
    lifeState = new Uint8Array(ROWS * COLS);
    for (var i = 0; i < lifeState.length; i++) lifeState[i] = Math.random() < 0.35 ? 1 : 0;
    lifeTick = 0;
  }
  function animLife() {
    if (lifeTick === 0) animLifeInit();
    var next = new Uint8Array(ROWS * COLS);
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var n = 0;
        for (var dr = -1; dr <= 1; dr++) {
          for (var dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            var nr = (r + dr + ROWS) % ROWS, nc = (c + dc + COLS) % COLS;
            n += lifeState[nr * COLS + nc];
          }
        }
        var alive = lifeState[r * COLS + c];
        next[r * COLS + c] = (alive && (n === 2 || n === 3)) || (!alive && n === 3) ? 1 : 0;
      }
    }
    lifeState = next;
    state.set(lifeState);
    lifeTick++;
    return lifeTick > 200;
  }

  // 5. Sine wave
  var wavePhase = 0;
  function animWave() {
    clear();
    for (var c = 0; c < COLS; c++) {
      var y1 = Math.sin((c * 0.2) + wavePhase * 0.1) * (ROWS * 0.3) + ROWS / 2;
      var y2 = Math.cos((c * 0.15) + wavePhase * 0.08) * (ROWS * 0.25) + ROWS / 2;
      for (var r = 0; r < ROWS; r++) {
        if (Math.abs(r - y1) < 1.5 || Math.abs(r - y2) < 1.5) set(r, c, 1);
      }
    }
    wavePhase++;
    return wavePhase > 200;
  }

  // 6. Spinning square
  var spinPhase = 0;
  function animSpin() {
    clear();
    var cx = COLS / 2, cy = ROWS / 2;
    var size = Math.min(COLS, ROWS) * 0.3;
    var angle = spinPhase * 0.06;
    var corners = [];
    for (var i = 0; i < 4; i++) {
      var a = angle + i * Math.PI / 2;
      corners.push({ x: cx + Math.cos(a) * size, y: cy + Math.sin(a) * size });
    }
    // Draw lines between corners
    for (var e = 0; e < 4; e++) {
      var p0 = corners[e], p1 = corners[(e + 1) % 4];
      var steps = 60;
      for (var s = 0; s <= steps; s++) {
        var t = s / steps;
        var px = p0.x + (p1.x - p0.x) * t;
        var py = p0.y + (p1.y - p0.y) * t;
        set(Math.round(py), Math.round(px), 1);
      }
    }
    spinPhase++;
    return spinPhase > 200;
  }

  // 7. Clock display
  var clockTick = 0;
  function animClock() {
    clear();
    var now = new Date();
    var opts = { timeZone: 'Europe/Stockholm', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    var time = now.toLocaleTimeString('en-GB', opts);
    // Draw time centered
    var textR = Math.floor((ROWS - 7) / 2);
    var totalW = time.length * 6 - 1;
    var textC = Math.floor((COLS - totalW) / 2);
    drawText(time, textR, textC);
    clockTick++;
    return clockTick > 200;
  }

  // 8. Noise dissolve
  var noisePhase = 0;
  function animNoise() {
    var density = Math.abs(Math.sin(noisePhase * 0.04));
    for (var i = 0; i < state.length; i++) {
      state[i] = Math.random() < density ? 1 : 0;
    }
    noisePhase++;
    return noisePhase > 40;
  }

  // --- Sequencer ---
  var animations = [
    { fn: animHello, reset: function() { helloPhase = 0; helloCellPtr = 0; clear(); } },
    { fn: animNoise, reset: function() { noisePhase = 0; } },
    { fn: animRings, reset: function() { ringPhase = 0; } },
    { fn: animNoise, reset: function() { noisePhase = 0; } },
    { fn: animWave, reset: function() { wavePhase = 0; } },
    { fn: animNoise, reset: function() { noisePhase = 0; } },
    { fn: animLife, reset: function() { lifeTick = 0; } },
    { fn: animNoise, reset: function() { noisePhase = 0; } },
    { fn: animSpin, reset: function() { spinPhase = 0; } },
    { fn: animNoise, reset: function() { noisePhase = 0; } },
    { fn: animRain, reset: function() { rainPhase = 0; } },
    { fn: animNoise, reset: function() { noisePhase = 0; } },
    { fn: animClock, reset: function() { clockTick = 0; } },
    { fn: animNoise, reset: function() { noisePhase = 0; } },
  ];

  var currentAnim = 0;
  var frameCount = 0;
  var FRAME_INTERVAL = 50; // ms between frames
  var lastFrame = 0;

  animations[0].reset();

  var animPaused = false;

  function loop(ts) {
    if (!animPaused) {
      if (ts - lastFrame >= FRAME_INTERVAL) {
        lastFrame = ts;
        var done = animations[currentAnim].fn();
        render();
        if (done) {
          currentAnim = (currentAnim + 1) % animations.length;
          animations[currentAnim].reset();
        }
      }
    }
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);

  // --- Game selector & games ---
  var gameTrigger = document.getElementById('game-trigger');
  var gameSelector = document.getElementById('game-selector');
  var gameHud = document.getElementById('game-hud');
  var gameScoreEl = document.getElementById('game-score');
  var options = gameSelector.querySelectorAll('.game-option');
  var selectorOpen = false;
  var activeIdx = 0;
  var activeGame = null; // null = animations running, string = game name
  var gameLoopId = null;

  function openSelector() {
    selectorOpen = true;
    gameSelector.classList.add('open');
    activeIdx = 0;
    updateSelectorHighlight();
  }

  function closeSelector() {
    selectorOpen = false;
    gameSelector.classList.remove('open');
  }

  function updateSelectorHighlight() {
    for (var i = 0; i < options.length; i++) {
      options[i].classList.toggle('active', i === activeIdx);
    }
  }

  function selectGame(name) {
    closeSelector();
    startGame(name);
  }

  gameTrigger.addEventListener('click', function(e) {
    if (activeGame) return;
    e.stopPropagation();
    if (selectorOpen) closeSelector();
    else openSelector();
  });

  for (var i = 0; i < options.length; i++) {
    (function(opt) {
      opt.addEventListener('click', function(e) {
        e.stopPropagation();
        selectGame(opt.dataset.game);
      });
    })(options[i]);
  }

  document.addEventListener('click', function() {
    if (selectorOpen) closeSelector();
  });

  // --- Game lifecycle ---
  function startGame(name) {
    animPaused = true;
    activeGame = name;
    clear();
    render();
    gameHud.classList.add('visible');
    if (name === 'snake') snakeStart();
  }

  function stopGame() {
    if (gameLoopId) { clearInterval(gameLoopId); gameLoopId = null; }
    activeGame = null;
    animPaused = false;
    gameHud.classList.remove('visible');
    clear();
    render();
    // Reset current animation so it restarts cleanly
    animations[currentAnim].reset();
  }

  // --- Keyboard handler ---
  var gameKeyHandler = null;

  document.addEventListener('keydown', function(e) {
    // Selector navigation
    if (selectorOpen) {
      if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = (activeIdx - 1 + options.length) % options.length; updateSelectorHighlight(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = (activeIdx + 1) % options.length; updateSelectorHighlight(); }
      else if (e.key === 'Enter') { e.preventDefault(); selectGame(options[activeIdx].dataset.game); }
      else if (e.key === 'Escape') { e.preventDefault(); closeSelector(); }
      return;
    }
    // Quit game
    if (activeGame && e.key === 'Escape') { e.preventDefault(); stopGame(); return; }
    // Forward to game
    if (activeGame && gameKeyHandler) gameKeyHandler(e);
  });

  // --- Touch controls for games ---
  var touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    if (!activeGame) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!activeGame) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    var absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return; // too short
    var key;
    if (absDx > absDy) key = dx > 0 ? 'ArrowRight' : 'ArrowLeft';
    else key = dy > 0 ? 'ArrowDown' : 'ArrowUp';
    if (gameKeyHandler) gameKeyHandler({ key: key, preventDefault: function(){} });
  });

  // --- Snake game ---
  var snake, snakeDir, snakeFood, snakeScore, snakeAlive, snakeInputQueue;

  function snakeStart() {
    var midR = Math.floor(ROWS / 2), midC = Math.floor(COLS / 2);
    snake = [{ r: midR, c: midC }, { r: midR, c: midC - 1 }, { r: midR, c: midC - 2 }];
    snakeDir = { r: 0, c: 1 };
    snakeInputQueue = [];
    snakeScore = 0;
    snakeAlive = true;
    gameScoreEl.textContent = 'score: 0';
    snakePlaceFood();

    gameKeyHandler = function(e) {
      var k = e.key;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(k) === -1) return;
      e.preventDefault();
      // Check against last queued direction (or current dir if queue empty)
      var ref = snakeInputQueue.length > 0 ? snakeInputQueue[snakeInputQueue.length - 1] : snakeDir;
      var nd = null;
      if (k === 'ArrowUp' && ref.r !== 1) nd = { r: -1, c: 0 };
      else if (k === 'ArrowDown' && ref.r !== -1) nd = { r: 1, c: 0 };
      else if (k === 'ArrowLeft' && ref.c !== 1) nd = { r: 0, c: -1 };
      else if (k === 'ArrowRight' && ref.c !== -1) nd = { r: 0, c: 1 };
      if (nd && snakeInputQueue.length < 3) snakeInputQueue.push(nd);
    };

    gameLoopId = setInterval(snakeTick, 120);
  }

  function snakePlaceFood() {
    var occupied = {};
    for (var i = 0; i < snake.length; i++) occupied[snake[i].r + ',' + snake[i].c] = true;
    var attempts = 0;
    do {
      snakeFood = { r: Math.floor(Math.random() * ROWS), c: Math.floor(Math.random() * COLS) };
      attempts++;
    } while (occupied[snakeFood.r + ',' + snakeFood.c] && attempts < 1000);
  }

  function snakeTick() {
    if (!snakeAlive) return;
    if (snakeInputQueue.length > 0) snakeDir = snakeInputQueue.shift();
    var head = snake[0];
    var nr = head.r + snakeDir.r;
    var nc = head.c + snakeDir.c;

    // Wall collision
    if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) { snakeDie(); return; }
    // Self collision
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].r === nr && snake[i].c === nc) { snakeDie(); return; }
    }

    snake.unshift({ r: nr, c: nc });

    // Eat food
    if (nr === snakeFood.r && nc === snakeFood.c) {
      snakeScore++;
      gameScoreEl.textContent = 'score: ' + snakeScore;
      snakePlaceFood();
    } else {
      snake.pop();
    }

    // Draw
    clear();
    // Draw food (blink)
    var blink = Date.now() % 400 < 250;
    if (blink) set(snakeFood.r, snakeFood.c, 1);
    // Draw snake
    for (var i = 0; i < snake.length; i++) set(snake[i].r, snake[i].c, 1);
    render();
  }

  function snakeDie() {
    snakeAlive = false;
    // Flash the grid
    var flashes = 0;
    var flashId = setInterval(function() {
      if (flashes % 2 === 0) {
        for (var i = 0; i < snake.length; i++) state[snake[i].r * COLS + snake[i].c] = 0;
      } else {
        for (var i = 0; i < snake.length; i++) state[snake[i].r * COLS + snake[i].c] = 1;
      }
      render();
      flashes++;
      if (flashes > 5) {
        clearInterval(flashId);
        // Show score briefly then exit
        clear();
        var scoreText = '' + snakeScore;
        var textR = Math.floor((ROWS - 7) / 2);
        var totalW = scoreText.length * 6 - 1;
        var textC = Math.floor((COLS - totalW) / 2);
        drawText(scoreText, textR, textC);
        render();
        setTimeout(function() { stopGame(); }, 1500);
      }
    }, 150);
    if (gameLoopId) { clearInterval(gameLoopId); gameLoopId = null; }
  }

})();
</script>

</body>
</html>
